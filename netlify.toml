[build]
  publish = "public"
  command = "npm run build"

[[redirects]]
  from = "/gemini/v1/*"
  to = "https://generativelanguage.googleapis.com/v1/:splat"
  status = 200

[[redirects]]
  from = "/gemini/v1beta/*"
  to = "https://generativelanguage.googleapis.com/v1beta/:splat"
  status = 200

[[redirects]]
  from = "/openai/v1/*"
  to = "https://api.openai.com/v1/:splat"
  status = 200

[[redirects]]
  from = "/groq/openai/v1/*"
  to = "https://api.groq.com/openai/v1/:splat"
  status = 200

[[redirects]]
  from = "/claude/v1/*"
  to = "https://api.anthropic.com/v1/:splat"
  status = 200

[[redirects]]
  from = "/cohere/v1/*"
  to = "https://api.cohere.ai/v1/:splat"
  status = 200

[[redirects]]
  from = "/huggingface/*"
  to = "https://api-inference.huggingface.co/:splat"
  status = 200

[[redirects]]
  from = "/fireworks/v1/*"
  to = "https://api.fireworks.ai/inference/v1/:splat"
  status = 200

[[redirects]]
  from = "/together/v1/*"
